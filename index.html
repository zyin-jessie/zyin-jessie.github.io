<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.0.3/tsparticles.confetti.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="style.css" />
<title>SSH Key Forge — Terminal</title>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="terminal" id="app">
  <div class="term-bar">
    <div class="term-dots">
      <div class="term-dot r"></div>
      <div class="term-dot y"></div>
      <div class="term-dot g"></div>
    </div>
    <div class="term-title">ssh-key-forge — terminal</div>
  </div>

  <div class="header">
    <h1>◈ SSH Key Forge</h1>
    <div class="score-block">
      <span class="lbl">Score</span>
      <span class="val" id="score-val">0</span>
    </div>
  </div>

  <div class="level-bar" id="level-bar">
    <div class="level-dot active" data-lvl="0"></div>
    <div class="level-dot" data-lvl="1"></div>
    <div class="level-dot" data-lvl="2"></div>
    <div class="level-dot" data-lvl="3"></div>
    <div class="level-dot" data-lvl="4"></div>
  </div>

  <div class="challenge" id="challenge">
    <div class="prompt-label">OBJECTIVE</div>
    <div class="task" id="task-text">Type <code>ssh-keygen -t ed25519</code> to generate a modern secure key.</div>
    <div class="hint" id="hint-text">Tip: <code>-t</code> sets the key type. Ed25519 is the most secure.</div>
  </div>

  <div class="output" id="output">
    <div class="line info">█ Welcome to SSH Key Forge — type a command to begin.</div>
  </div>

  <div class="input-line">
    <span class="prompt">$</span>
    <input type="text" id="cmd-input" placeholder="command..." autofocus spellcheck="false" autocomplete="off" />
  </div>

  <div class="feedback" id="feedback"></div>

  <div class="btn-row" id="btn-row">
    <button class="btn btn-primary" id="submit-btn">Run</button>
    <button class="btn btn-secondary" id="hint-btn">Hint</button>
    <button class="btn btn-secondary" id="reset-btn">Reset</button>
  </div>

  <button class="btn btn-primary" id="play-again-btn" style="display:none;">Play Again</button>
</div>

<script src="script.js"></script>
</body>
</html>
